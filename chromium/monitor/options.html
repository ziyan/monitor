<!DOCTYPE html>
<html>
<head>
  <title>Monitor Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 32px;
      max-width: 640px;
    }
    h1 { font-size: 20px; margin-bottom: 24px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    textarea {
      width: 100%;
      height: 160px;
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 8px;
      font-family: monospace;
      font-size: 13px;
      resize: vertical;
    }
    input[type="number"] {
      width: 120px;
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 8px;
      font-size: 14px;
    }
    .field { margin-bottom: 20px; }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }
    button {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    #status {
      display: inline-block;
      margin-left: 12px;
      font-size: 14px;
      color: #4ade80;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #status.visible { opacity: 1; }
  </style>
</head>
<body>
  <h1>Monitor Options</h1>

  <div class="field">
    <label for="urls">URLs (one per line)</label>
    <textarea id="urls"></textarea>
  </div>

  <div class="field">
    <label for="interval">Cycle interval (seconds)</label>
    <input type="number" id="interval" min="5" step="1">
    <div class="hint">Minimum 5 seconds</div>
  </div>

  <button id="save">Save</button>
  <span id="status">Saved</span>

  <script src="options.js"></script>
</body>
</html>
